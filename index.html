<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Games</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <header class="header">
    <div class="header__logo">
      <span class="header__logo-icon">&#9632;</span>
      <span class="header__logo-text">Mini Games</span>
    </div>
    <span class="header__version" id="version-badge">v2.0.0</span>
    <button
      onclick="openChangelog()"
      style="cursor:pointer;font-size:7px;font-family:'Press Start 2P',monospace;color:#00fff0;background:transparent;border:2px solid #00fff0;padding:5px 10px;text-transform:uppercase;outline:none;"
      onmouseenter="this.style.background='rgba(0,255,240,0.12)';this.style.color='#fff';"
      onmouseleave="this.style.background='transparent';this.style.color='#00fff0';"
      aria-label="O que há de novo"
    >NEW!</button>
  </header>

  <main class="main">
    <section class="hero">
      <h1 class="hero__title">Escolha um Jogo</h1>
      <p class="hero__subtitle">Jogos feitos com HTML5 Canvas</p>
    </section>

    <section class="games-grid" id="games-grid">
      <!-- Cards injetados via main.js -->
    </section>
  </main>

  <footer class="footer">
    <span>Mini Games &copy; 2026</span>
  </footer>

  <script src="src/main.js"></script>
  <script src="src/changelog.js"></script>
</body>
</html>

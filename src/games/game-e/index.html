<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders — Mini Games</title>
  <link rel="stylesheet" href="../../../styles/main.css" />
  <style>
    .canvas-wrapper { width: 800px; height: 500px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="game-page">
    <div class="game-page__header">
      <a class="btn-back" href="../../../index.html">&#8592; MENU</a>
      <h1 class="game-page__title">SPACE INVADERS</h1>
    </div>

    <div class="hud">
      <div>
        <div class="hud__label">SCORE</div>
        <div class="hud__score" id="score">0</div>
      </div>
    </div>

    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>

      <div class="overlay overlay--hidden" id="overlay">
        <div class="overlay__title" id="overlay-title">GAME OVER</div>
        <div class="overlay__score" id="overlay-score"></div>
        <button class="btn btn--primary" id="btn-restart">PLAY AGAIN</button>
        <a class="btn btn--ghost" href="../../../index.html">BACK TO MENU</a>
      </div>
    </div>
  </div>

  <script src="../../../src/engine/GameBase.js"></script>
  <script src="game.js"></script>
</body>
</html>
